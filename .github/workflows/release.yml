name: Build & Release

on:
  push:
    tags:
      - 'v*'          # si attiva su ogni tag tipo v1.0, v1.2.3, ecc.
  workflow_dispatch:  # permette lancio manuale dalla UI di GitHub

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ───────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Gradle permission ─────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. Build unsigned release APK ────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      # ── 6. Sign APK (opzionale ma consigliato) ────────────────────────
      # Per abilitare la firma, crea i seguenti repository secrets:
      #   KEYSTORE_BASE64   → keystore.jks codificato in base64
      #                       (openssl base64 -in keystore.jks)
      #   KEY_ALIAS         → alias della chiave nel keystore
      #   KEY_PASSWORD      → password della chiave
      #   STORE_PASSWORD    → password del keystore
      - name: Sign APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/rnote-viewer-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f keystore.jks

      # ── 7. Determina il nome dell'APK da pubblicare ───────────────────
      - name: Locate APK
        id: apk
        run: |
          SIGNED="app/build/outputs/apk/release/rnote-viewer-signed.apk"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$SIGNED" ]; then
            echo "path=$SIGNED" >> $GITHUB_OUTPUT
            echo "name=rnote-viewer-signed.apk" >> $GITHUB_OUTPUT
          else
            echo "path=$UNSIGNED" >> $GITHUB_OUTPUT
            echo "name=rnote-viewer-unsigned.apk" >> $GITHUB_OUTPUT
          fi

      # ── 8. Carica APK come artifact (utile per test su branch) ────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rnote-viewer-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14

      # ── 9. Crea GitHub Release (solo su tag v*) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Rnote Viewer ${{ github.ref_name }}"
          body: |
            ## Rnote Viewer ${{ github.ref_name }}

            Visualizzatore Android per file `.rnote`.

            ### Installazione
            1. Scarica l'APK qui sotto
            2. Sul dispositivo: Impostazioni → App → Installa da fonti sconosciute
            3. Apri il file APK scaricato e installa

            ### Note
            - Richiede Android 8.0 (API 26) o superiore
            - Per i font personalizzati: Menu → Gestisci font… → + Aggiungi font
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # es. v1.0-beta → prerelease, v1.0 → release stabile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
