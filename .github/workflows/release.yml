name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Installa Gradle e rigenera il wrapper ──────────────────────
      # Il gradlew nel repo è stato generato manualmente e ha un bug nelle
      # opzioni JVM. Lo rigeneriamo dalla distribuzione ufficiale.
      - name: Regenerate Gradle wrapper
        run: |
          GRADLE_VERSION=8.4
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O gradle.zip
          unzip -q gradle.zip
          ./gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION} --distribution-type bin
          chmod +x ./gradlew
          rm -rf gradle.zip gradle-${GRADLE_VERSION}

      # ── 4. Cache Gradle ───────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 5. Build release APK ─────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      # ── 6. Sign APK (opzionale) ───────────────────────────────────────
      # Per abilitare la firma aggiungi questi repository secrets:
      #   KEYSTORE_BASE64  → keystore.jks in base64 (openssl base64 -in keystore.jks)
      #   KEY_ALIAS        → alias della chiave
      #   KEY_PASSWORD     → password della chiave
      #   STORE_PASSWORD   → password del keystore
      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS:       ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:    ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD:  ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Nessun keystore configurato, firma saltata."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/rnote-viewer-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f keystore.jks

      # ── 7. Trova il percorso dell'APK ────────────────────────────────
      - name: Locate APK
        id: apk
        run: |
          SIGNED="app/build/outputs/apk/release/rnote-viewer-signed.apk"
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$SIGNED" ]; then
            echo "path=$SIGNED" >> $GITHUB_OUTPUT
          else
            echo "path=$UNSIGNED" >> $GITHUB_OUTPUT
          fi

      # ── 8. Carica APK come artifact ───────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rnote-viewer-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 14

      # ── 9. Crea GitHub Release (solo su tag v*) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Rnote Viewer ${{ github.ref_name }}"
          body: |
            ## Rnote Viewer ${{ github.ref_name }}

            Visualizzatore Android per file `.rnote`.

            ### Installazione
            1. Scarica l'APK qui sotto
            2. Sul dispositivo: Impostazioni → App → Installa da fonti sconosciute
            3. Apri il file APK scaricato e installa

            ### Note
            - Richiede Android 8.0 (API 26) o superiore
            - Per i font personalizzati: Menu → Gestisci font… → + Aggiungi font
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
